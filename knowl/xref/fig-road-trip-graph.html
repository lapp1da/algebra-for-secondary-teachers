<figure class="figure figure-like"><div class="para">One of the longest stretches of straight (and flat) road in North America can be found on the Great Plains in the state of North Dakota on state highway 46, which lies just south of the interstate highway I-94 and runs through the town of Gackle. A car leaves town (at time t=0) and heads east on highway 46; its position in miles from Gackle at time t in minutes is given by the graph of the function in Figure 1.5.1. Three important points are labeled on the graph; where the curve looks linear, assume that it is indeed a straight line.</div>
<div class="image-box" style="width: 50%; margin-left: 25%; margin-right: 25%;"><img src="external/images/ac-roadtrip-graph.png" class="contained" alt="Graph for Roadtrip"></div>
<div class="para">Figure 1.5.1: The graph of <span class="process-math">\(y=s\left(t\right)\text{,}\)</span> the position of the car along highway 46, which tells its distance in miles from Gackle, ND, at time <span class="process-math">\(t\)</span> in minutes.</div>
<div class="para logical"><ol class="lower-alpha" id="fig-road-trip-graph-5-1">
<li><div class="para">In everyday language, describe the behavior of the car over the provided time interval. In particular, discuss what is happening on the time intervals [57,68] and [68,104].</div></li>
<li><div class="para">Find the slope of the line between the points (57,63.8) and (104,106.8).  What are the units on this slope? What does the slope represent?</div></li>
<li><div class="para">Find the average rate of change of the car’s position on the interval [68,104].  Include units on your answer.</div></li>
<li><div class="para">Estimate the instantaneous rate of change of the car’s position at the moment <span class="process-math">\(t=80\text{.}\)</span> Write a sentence to explain your reasoning and the meaning of this value.</div></li>
</ol></div>
